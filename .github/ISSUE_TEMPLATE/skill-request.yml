name: Skill Request
description: Request a new clinical radiology skill
title: "Skill Request: [skill-name]"
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a new skill! Please fill out the details below.

  - type: input
    id: skill-name
    attributes:
      label: Suggested skill name
      description: Lowercase, hyphens only (e.g., "ct-brain-analysis")
      placeholder: "my-skill-name"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What should this skill do?
      description: Describe the skill's purpose and capabilities
      placeholder: "This skill should help with..."
    validations:
      required: true

  - type: textarea
    id: triggers
    attributes:
      label: When should it be used?
      description: What trigger phrases or scenarios should activate this skill?
      placeholder: |
        - When the user says "..."
        - When working on...
    validations:
      required: true

  - type: textarea
    id: examples
    attributes:
      label: Example use cases
      description: Provide 1-3 specific examples of how you'd use this skill
      placeholder: |
        1. I want to...
        2. Help me...
    validations:
      required: false

  - type: dropdown
    id: category
    attributes:
      label: Category
      description: Which category does this skill fit into?
      options:
        - Clinical Documentation
        - Patient Communication
        - Workflow Coordination
        - Analytics / Quality
        - Research / Evidence
        - Platform Integration
        - AI Assistants
        - Dataset Management
        - Other
    validations:
      required: true

  - type: textarea
    id: related-skills
    attributes:
      label: Related existing skills
      description: Are there existing skills this relates to or differs from?
      placeholder: "Similar to pacs-workflow but focused on..."
    validations:
      required: false

  - type: checkboxes
    id: requirements
    attributes:
      label: Before submitting
      options:
        - label: "I understand skills require evals.json and SKILL.md"
        - label: "This benefits radiology AI broadly (not just my use case)"
        - label: "I am willing to help test/implement this skill"
