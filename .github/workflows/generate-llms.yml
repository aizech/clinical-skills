name: Generate llms.txt

on:
  push:
    branches: [master]
    paths:
      - 'skills/**'
      - 'tools/integrations/**'
      - 'tools/clis/**'
      - '.github/scripts/generate-llms.js'
  pull_request:
    paths:
      - 'skills/**'
      - 'tools/integrations/**'
      - 'tools/clis/**'
      - '.github/scripts/generate-llms.js'

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate llms.txt
        run: |
          mkdir -p public
          node .github/scripts/generate-llms.js public/llms.txt

      - name: Upload llms.txt artifact
        uses: actions/upload-artifact@v4
        with:
          name: llms.txt
          path: public/llms.txt
          retention-days: 7

      - name: Show generated content
        run: |
          echo "Generated llms.txt:"
          head -50 public/llms.txt

      - name: Commit llms.txt
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: update llms.txt"
          file_pattern: "public/llms.txt"
