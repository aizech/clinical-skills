name: Sync Skills

on:
  push:
    branches: [main]
    paths:
      - 'skills/**'

jobs:
  sync:
    runs-on: ubuntu-slim
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Sync skills
        run: node .github/scripts/sync-skills.js

      - name: Pull latest changes
        run: git pull --rebase origin main

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_user_name: Aizechbot
          commit_user_email: aizech+github-actions[bot]@users.noreply.github.com
          commit_message: "chore: sync skills with marketplace.json and README"
          file_pattern: ".claude-plugin/marketplace.json README.md"
