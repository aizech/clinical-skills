name: Sync Skills

on:
  push:
    branches: [main]
    paths:
      - 'skills/**'

jobs:
  sync:
    runs-on: ubuntu-slim
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Sync skills
        run: node .github/scripts/sync-skills.js

      - name: Configure Git
        run: |
          git config user.name "Aizechbot"
          git config user.email "aizech+github-actions[bot]@users.noreply.github.com"

      - name: Commit and push changes
        run: |
          git add .claude-plugin/marketplace.json README.md
          git diff --staged --quiet || git commit -m "chore: sync skills with marketplace.json and README"
          git pull --rebase origin main
          git push origin main
