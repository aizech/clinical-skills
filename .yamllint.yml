# YAML linting configuration for clinical-skills
extends: default

rules:
  line-length:
    max: 120
    level: warning

  indentation:
    spaces: 2
    indent-sequences: true

  comments:
    min-spaces-from-content: 1

  comments-indentation: {}

  document-start: disable

  truthy:
    allowed-values: ['true', 'false', 'yes', 'no']

ignore: |
  node_modules/
  .venv/
  *.egg-info/
